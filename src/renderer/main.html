<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Antenna Console</title>
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --header-h: 72px;
      --bg: #0f172a; --panel: #111827; --text: #e5e7eb;
      --accent: #22c55e; --muted: #94a3b8; --danger: #ef4444;
      --border: rgba(255,255,255,.08);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%;
      background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial;
    }

    /* ── Header ── */
    header {
      height: var(--header-h);
      display: flex; align-items: center; gap: 0;
      background: #111827;
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
    }
    header * { -webkit-app-region: no-drag; }

    /* App brand (left) */
    .hd-brand {
      display: flex; align-items: center; gap: 10px;
      padding: 0 16px;
      border-right: 1px solid var(--border);
      height: 100%;
      flex-shrink: 0;
    }
    .hd-brand img { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; }
    .hd-brand-name { font-weight: 800; font-size: 14px; letter-spacing: .3px; white-space: nowrap; }

    /* Company section */
    .hd-company {
      display: flex; align-items: center; gap: 10px;
      padding: 0 16px;
      border-right: 1px solid var(--border);
      height: 100%;
      flex-shrink: 0;
      min-width: 0;
    }
    .hd-company-logo {
      width: 36px; height: 36px; border-radius: 8px;
      object-fit: contain;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      flex-shrink: 0;
      display: none; /* shown after load */
    }
    .hd-company-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .hd-company-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
    .hd-company-name  { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* User / antenna pills */
    .hd-user {
      display: flex; flex-direction: column; gap: 4px;
      padding: 0 16px;
      border-right: 1px solid var(--border);
      height: 100%; justify-content: center;
      flex-shrink: 0;
    }
    .pill {
      padding: 2px 10px; border-radius: 999px;
      background: rgba(255,255,255,.07);
      font-size: 11px; white-space: nowrap;
    }

    /* Controls */
    .hd-controls {
      display: flex; align-items: center; gap: 8px;
      padding: 0 14px;
      border-right: 1px solid var(--border);
      height: 100%;
      flex-shrink: 0;
    }
    .hd-col { display: flex; flex-direction: column; gap: 5px; }

    select {
      height: 30px; border-radius: 8px; border: 1px solid rgba(255,255,255,.12);
      background: #0b1020; color: var(--text); padding: 0 8px;
      outline: none; font-size: 12px; cursor: pointer;
    }

    /* Buttons */
    .btn {
      height: 32px; border-radius: 8px; border: none;
      font-weight: 700; font-size: 12px; cursor: pointer;
      padding: 0 14px; white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #052e12; }
    .btn-primary:hover { background: #16a34a; }
    .btn-secondary {
      background: rgba(255,255,255,.08); color: var(--text);
      border: 1px solid rgba(255,255,255,.12);
    }
    .btn-secondary:hover { background: rgba(255,255,255,.14); }
    /* ── 3-dots menu button ── */
    .btn-dots {
      width: 26px; height: 26px; border-radius: 7px;
      background: transparent; border: 1px solid transparent;
      color: var(--muted); font-size: 16px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .12s, border-color .12s, color .12s;
      flex-shrink: 0;
    }
    .btn-dots:hover { background: rgba(255,255,255,.09); border-color: var(--border); color: var(--text); }
    .btn-dots:active { background: rgba(255,255,255,.14); }

    /* Spacer + status */
    .spacer { flex: 1; min-width: 0; }
    .hd-status {
      display: flex; flex-direction: column; gap: 2px;
      font-size: 11px; color: var(--muted); padding: 0 16px;
      min-width: 220px; max-width: 320px; flex-shrink: 0;
    }
    .err { color: var(--danger); }

    main { height: calc(100% - var(--header-h)); }

    body.mac header { padding-left: 80px; }
  </style>
</head>
<body>
  <header>

    <!-- App brand + menu trigger -->
    <div class="hd-brand">
      <img src="./SINPRO_LOGO.png" alt="Logo" />
      <span class="hd-brand-name">SINPRO Console</span>
      <button id="menuBtn" class="btn-dots" title="Opciones">⋮</button>
    </div>

    <!-- Company info -->
    <div class="hd-company">
      <img id="companyLogo" class="hd-company-logo" alt="Company" />
      <div class="hd-company-info">
        <span class="hd-company-label">Empresa</span>
        <span id="companyName" class="hd-company-name">—</span>
      </div>
    </div>

    <!-- User / current antenna -->
    <div class="hd-user">
      <div id="userBox"    class="pill">Usuario: —</div>
      <div id="antennaBox" class="pill">Antena: —</div>
    </div>

    <!-- Selects + connect -->
    <div class="hd-controls">
      <div class="hd-col">
        <select id="locality" title="Localidad"></select>
        <select id="antenna"  title="Antena"></select>
      </div>
      <button id="btnConnect" class="btn btn-primary">Conectar</button>
    </div>

    <div class="spacer"></div>

    <!-- Antennas status button -->
    <button id="btnAntennasView" class="btn btn-secondary" style="margin-right:12px;">
      📡 Ver Antenas
    </button>

    <!-- Status messages -->
    <div class="hd-status">
      <div id="statusLine">Estado: esperando selección…</div>
      <div id="errorLine"  class="err"></div>
    </div>


  </header>
  <main></main>

  <script>
    const $ = (id) => document.getElementById(id)

    const localitySel     = $('locality')
    const antennaSel      = $('antenna')
    const btnConnect      = $('btnConnect')
    const btnAntennasView = $('btnAntennasView')
    const userBox         = $('userBox')
    const antennaBox      = $('antennaBox')
    const statusLine      = $('statusLine')
    const errorLine       = $('errorLine')
    const companyLogo     = $('companyLogo')
    const companyNameEl   = $('companyName')
    const menuBtn         = $('menuBtn')

    let allAntennas  = []
    let currentAntenna = null

    function setStatus(msg) { statusLine.textContent = `Estado: ${msg}` }
    function setError(msg)  { errorLine.textContent  = msg || '' }

    function updateHeaderUser(user) {
      userBox.textContent = `Usuario: ${user?.displayName || user?.username || '—'}`
    }
    function updateHeaderAntenna(ant) {
      antennaBox.textContent = `Antena: ${ant?.name || '—'}`
    }

    function buildAntennasForLocality(localityId) {
      const filtered = allAntennas.filter(a => a.locality_id === localityId)
      antennaSel.innerHTML = ''
      filtered.forEach(a => {
        const opt = document.createElement('option')
        opt.value = a.id
        opt.textContent = a.name
        antennaSel.appendChild(opt)
      })
    }

    async function init() {
      // Session
      const session = await window.api.getSession()
      updateHeaderUser(session.user)

      // Company
      const company = await window.api.getCompany()
      if (company) {
        companyNameEl.textContent = company.name
        if (company.imageDataUrl) {
          companyLogo.src = company.imageDataUrl
          companyLogo.style.display = 'block'
        }
      }

      // Localities
      const localities = await window.api.getLocalities()
      localitySel.innerHTML = ''
      localities.forEach(l => {
        const opt = document.createElement('option')
        opt.value = l.id
        opt.textContent = l.name
        localitySel.appendChild(opt)
      })

      // Antennas (all for this company, renderer filters by locality)
      allAntennas = await window.api.getAntennas()

      if (localities.length > 0) {
        buildAntennasForLocality(localities[0].id)
      }

      localitySel.addEventListener('change', () => {
        buildAntennasForLocality(localitySel.value)
      })

      // Restore current antenna selection
      if (session.currentAntenna) {
        currentAntenna = session.currentAntenna
        const ant = allAntennas.find(a => a.id === session.currentAntenna.id)
        if (ant) {
          localitySel.value = ant.locality_id
          buildAntennasForLocality(ant.locality_id)
          antennaSel.value  = session.currentAntenna.id
        }
        updateHeaderAntenna(currentAntenna)
      }

      setStatus('Listo')
    }

    async function connect() {
      setError('')
      setStatus('Conectando…')
      const antennaId = antennaSel.value
      const res = await window.api.navigateTo(antennaId)
      if (!res.ok) {
        setError(res.message || 'No se pudo conectar')
        setStatus('Error de conexión')
        return
      }
      setError('')
      const ant = allAntennas.find(a => a.id === antennaId)
      currentAntenna = ant
      updateHeaderAntenna(ant)
      setStatus(`Conectado a ${ant.name}`)
    }

    // ── 3-dots menu → native OS menu (bypasses BrowserView layer) ──
    menuBtn.addEventListener('click', () => window.api.showAppMenu())

    btnConnect.addEventListener('click', connect)
    btnAntennasView.addEventListener('click', () => window.api.openAntennasStatus())

    window.api.onViewError(msg => setError(msg))
    window.api.onAntennaChanged(ant => updateHeaderAntenna(ant))

    init().catch(e => setError(String(e)))
  </script>
  <script>
    if (window.api?.platform === 'darwin') document.body.classList.add('mac')
  </script>
</body>
</html>
